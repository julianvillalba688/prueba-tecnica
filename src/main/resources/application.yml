server:
  port: 8085

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/loan_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
